services:
  - type: web
    name: business-system
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev
      php artisan key:generate --force
    startCommand: |
      php artisan migrate --force
      vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: PHP_VERSION
        value: "8.2"