services:
  - type: web
    name: Business System
    runtime: php
    runtimeVersion: 8.2
    buildCommand: composer install && php artisan key:generate --force && php artisan cache:clear && npm ci && npm run build
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: PHP_VERSION
        value: 8.2
      - key: NODE_VERSION
        value: 18
